{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    {{ if .Date }}
    <div class="post-meta">
      <time>{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.readingTime }}<span>&middot; {{ . }} min read</span>{{ end }}
    </div>
    {{ end }}
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
