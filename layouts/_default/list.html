{{ define "main" }}
<div class="page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="page-description">{{ . }}</div>{{ end }}
</div>

{{ range .Pages.GroupByDate "2006" }}
<div class="year-group">
  <h2 class="year-label">{{ .Key }}</h2>
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <time>{{ .Date.Format "Jan 2" }}</time>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
{{ end }}
